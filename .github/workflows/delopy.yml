name: Build and Deploy Vaultwarden with Nginx

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  TARGET_DIR: /opt/vaultwarden
  BINARY_NAME: vaultwarden
  SERVICE_NAME: vaultwarden
  VAULT_PORT: 8080

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Vaultwarden binary inside Debian 12
        run: |
          set -e

          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            debian:12 \
            bash -lc '
              set -e
              apt-get update
              apt-get install -y --no-install-recommends \
                ca-certificates \
                curl \
                build-essential \
                pkg-config \
                libssl-dev \
                libsqlite3-dev

              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              . "$HOME/.cargo/env"

              cargo build --release --features sqlite
              strip target/release/vaultwarden || true
            '

      - name: Download web-vault
        run: |
          set -e

          mkdir -p release/web-vault

          cp target/release/vaultwarden release/vaultwarden
          chmod +x release/vaultwarden

          WEB_TAG="$(curl -fsSL https://api.github.com/repos/dani-garcia/bw_web_builds/releases/latest | jq -r .tag_name)"
          echo "Using web-vault release: $WEB_TAG"

          curl -fL \
            -o bw_web.tar.gz \
            "https://github.com/dani-garcia/bw_web_builds/releases/download/${WEB_TAG}/bw_web_${WEB_TAG}.tar.gz"

          tar -xzf bw_web.tar.gz -C release/web-vault

          tar -czf vaultwarden-native.tar.gz -C release .

      - name: Prepare VPS directory
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /opt/vaultwarden
            mkdir -p /opt/vaultwarden/data

      - name: Upload package to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "vaultwarden-native.tar.gz"
          target: "/tmp/"

      - name: Install and restart Vaultwarden
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            TARGET_DIR="/opt/vaultwarden"
            SERVICE_NAME="vaultwarden"
            VAULT_PORT="8080"
            VAULT_DOMAIN="${{ secrets.VAULT_DOMAIN }}"

            mkdir -p "$TARGET_DIR"
            mkdir -p "$TARGET_DIR/data"
            mkdir -p /tmp/vaultwarden-release

            systemctl stop "$SERVICE_NAME" 2>/dev/null || true

            rm -rf /tmp/vaultwarden-release/*
            tar -xzf /tmp/vaultwarden-native.tar.gz -C /tmp/vaultwarden-release

            install -m 755 /tmp/vaultwarden-release/vaultwarden "$TARGET_DIR/vaultwarden"

            rm -rf "$TARGET_DIR/web-vault"
            cp -a /tmp/vaultwarden-release/web-vault "$TARGET_DIR/web-vault"

            cat > /etc/vaultwarden.env << EOF
            ROCKET_ADDRESS=127.0.0.1
            ROCKET_PORT=$VAULT_PORT
            ROCKET_WORKERS=3

            DATA_FOLDER=$TARGET_DIR/data
            WEB_VAULT_ENABLED=true
            WEB_VAULT_FOLDER=$TARGET_DIR/web-vault

            DOMAIN=https://$VAULT_DOMAIN
            SIGNUPS_ALLOWED=false
            INVITATIONS_ALLOWED=false
            EOF

            cat > /etc/systemd/system/$SERVICE_NAME.service << EOF
            [Unit]
            Description=Vaultwarden
            After=network.target

            [Service]
            Type=simple
            User=root
            Group=root
            WorkingDirectory=$TARGET_DIR
            EnvironmentFile=/etc/vaultwarden.env
            ExecStart=$TARGET_DIR/vaultwarden
            Restart=always
            RestartSec=10
            LimitNOFILE=65535
            NoNewPrivileges=yes
            PrivateTmp=yes

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"

            systemctl status "$SERVICE_NAME" --no-pager -l

            echo "✅ 部署完成！现在可以通过 http://$(hostname -I | awk '{print $1}') 访问 Vaultwarden"
